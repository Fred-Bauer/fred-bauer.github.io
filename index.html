<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fred Bauer</title>
    <link rel="icon" type="image/png" href="Melone.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="geocities.css">
    <script>
    /**
     * Zufälliges Emoji aus dem gesamten Unicode-Emoji-Raum.
     *
     * String.fromCodePoint() wandelt einen Integer-Codepoint direkt
     * in den Unicode-Charakter um — auch für Supplementary-Plane-
     * Zeichen (> U+FFFF), die JS intern als Surrogate-Pair speichert.
     *
     * Die Ranges decken die wichtigsten, dicht befüllten Emoji-Blöcke
     * ab und lassen dünn besiedelte Blöcke (z.B. Alchemie U+1F700)
     * weg, um "Tofu"-Rechtecke auf älteren Systemen zu minimieren.
     */
    function randomEmoji() {
        const ranges = [
            [0x1F300, 0x1F3FF], // Misc Symbols & Pictographs
            [0x1F400, 0x1F4FF], // Tiere, Natur, Objekte
            [0x1F500, 0x1F5FF], // Symbole, Uhren, Büros
            [0x1F600, 0x1F64F], // Emoticons (Gesichter)
            [0x1F680, 0x1F6FF], // Transport & Karten
            [0x1F900, 0x1F9FF], // Supplemental Symbols
            [0x1FA70, 0x1FAFF], // Symbols & Pictographs Extended-A
            [0x2600,  0x26FF],  // Verschiedene Symbole
            [0x2700,  0x27BF],  // Dingbats
        ];
        const r = ranges[Math.floor(Math.random() * ranges.length)];
        return String.fromCodePoint(r[0] + Math.floor(Math.random() * (r[1] - r[0] + 1)));
    }

    document.addEventListener('DOMContentLoaded', function () {
        /* Jeder Link bekommt sein eigenes unabhängig gezogenes Emoji —
           kein Pool, keine Wiederholungsvermeidung nötig. */
        document.querySelectorAll('.index-links a').forEach(a => {
            a.setAttribute('data-icon', randomEmoji());
        });
    });

    /**
     * Besuchszähler via localStorage.
     *
     * Beim ersten Besuch (kein Eintrag vorhanden) wird ein
     * zufälliger Startoffset zwischen 10.000 und 50.000 gewählt,
     * damit der Counter sofort realistisch wirkt.
     * Bei jedem weiteren Besuch wird +1 addiert.
     * Das Ergebnis wird sechsstellig mit führenden Nullen angezeigt.
     */
    (function () {
        const KEY = 'visitor-count';
        const stored = localStorage.getItem(KEY);
        /* Math.random() * 40000 + 10000 → gleichmäßig verteilt in [10000, 50000) */
        const count = stored !== null
            ? parseInt(stored, 10) + 1
            : Math.floor(Math.random() * 40000 + 10000);
        localStorage.setItem(KEY, count);
        /* padStart(6, '0') stellt führende Nullen sicher */
        document.getElementById('counter-digits').textContent =
            String(count).padStart(6, '0');
    })();
    </script>
</head>

    </a>

             Neue Widgets können einfach in .sidebar-left oder
             .sidebar-right eingefügt werden. -->
        <div class="sidebar-left">

        </div>

        <div class="page-box">

            <ul class="index-links">

                </li>
                <li>
                    <a href="https://fred-bauer.github.io/kassenrechner/">Kassenrechner</a>
                    <div class="link-desc">Externer Link zum Kassenrechner für den Kletterwald</div>
                </li>
            </ul>
        </div>

        <!-- Rechte Sidebar: Besuchszähler und künftige Widgets -->
        <div class="sidebar-right">
            <div class="visitor-counter">
                <div class="counter-label">You are visitor number</div>
                <div class="counter-digits" id="counter-digits">000000</div>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
